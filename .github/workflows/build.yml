name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            triplet: x64-linux
            build_type: Release
            name: Linux-x64
          - os: windows-latest
            triplet: x64-windows-static
            build_type: Release
            name: Windows-x64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            git \
            autoconf \
            autoconf-archive \
            automake \
            libtool

      # vcpkg 缓存 - 基于 vcpkg.json 和 triplet
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.triplet }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Prepare Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          cp build/release/iot-manager package/
          cp -r dist package/
          cp config/config.json package/

      - name: Prepare Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path package
          Copy-Item build/release/iot-manager.exe package/
          Copy-Item -Recurse dist package/
          Copy-Item config/config.json package/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iot-manager-${{ matrix.name }}
          path: package/
          retention-days: 7
