name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    runs-on: ubuntu-latest
    name: linux - ${{ matrix.build_type }}

    env:
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_BINARY_CACHE_DIR: ${{ github.workspace }}/vcpkg_binary_cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg_binary_cache,readwrite
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CC: clang-18
      CXX: clang++-18

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE_DIR }}
          key: vcpkg-binary-linux-x64-linux-${{ matrix.build_type }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-binary-linux-x64-linux-${{ matrix.build_type }}-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 autoconf autoconf-archive automake libtool

      # 恢复 vcpkg 已安装包缓存（Configure 前）
      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-linux-x64-linux-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        run: |
          if [ ! -d "${{ github.workspace }}/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}/vcpkg"
          fi
          cd "${{ github.workspace }}/vcpkg"
          git fetch --depth 1 origin 66c0373dc7fca549e5803087b9487edfe3aca0a1
          git checkout --detach 66c0373dc7fca549e5803087b9487edfe3aca0a1
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}
          -DCMAKE_C_FLAGS_RELEASE="-O3 -DNDEBUG -g"
          -DCMAKE_CXX_FLAGS_RELEASE="-O3 -DNDEBUG -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld -Wl,--build-id=sha1"

      # 保存 vcpkg 缓存（Configure 后、Build 前，仅在缓存未命中时保存）
      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true' && matrix.build_type == 'Release'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-linux-x64-linux-${{ hashFiles('vcpkg.json') }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Export Release symbols
        if: matrix.build_type == 'Release'
        run: |
          mkdir -p build/symbols
          objcopy --only-keep-debug build/release/iot-manager build/symbols/iot-manager.debug
          objcopy --add-gnu-debuglink=build/symbols/iot-manager.debug build/release/iot-manager

      # Strip Release 二进制（保留 debuglink 后再 UPX）
      - name: Strip binary
        if: matrix.build_type == 'Release'
        run: strip --strip-debug --strip-unneeded build/release/iot-manager

      # UPX 压缩 Release 二进制（最优压缩）
      - name: Compress with UPX
        if: matrix.build_type == 'Release'
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl
          upx --best --lzma build/release/iot-manager

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: iot-manager-linux-${{ matrix.build_type }}
          path: build/${{ matrix.build_type == 'Release' && 'release' || 'debug' }}/
          retention-days: 3

      - name: Upload Release symbols
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v7
        with:
          name: iot-manager-linux-Release-symbols
          path: build/symbols/
          retention-days: 3

  build-windows:
    runs-on: windows-2022
    name: windows - Release

    env:
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_BINARY_CACHE_DIR: ${{ github.workspace }}/vcpkg_binary_cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg_binary_cache,readwrite
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE_DIR }}
          key: vcpkg-binary-windows-x64-static-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-binary-windows-x64-static-

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-windows-x64-static-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "${{ github.workspace }}\\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}\\vcpkg"
          }
          Set-Location "${{ github.workspace }}\\vcpkg"
          git fetch --depth 1 origin 66c0373dc7fca549e5803087b9487edfe3aca0a1
          git checkout --detach 66c0373dc7fca549e5803087b9487edfe3aca0a1
          .\\bootstrap-vcpkg.bat -disableMetrics

      - name: Locate MSVC
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio with MSVC tools was not found"
          }

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path $vcvars)) {
            throw "vcvars64.bat was not found at $vcvars"
          }

          "VCVARS64=$vcvars" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          cmd /c "`"$env:VCVARS64`" >nul && cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=`"${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake`" -DVCPKG_INSTALLED_DIR=`"${{ env.VCPKG_INSTALLED_DIR }}`" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DBUILD_FRONTEND=OFF"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-windows-x64-static-${{ hashFiles('vcpkg.json') }}

      - name: Build
        shell: pwsh
        run: |
          cmd /c "`"$env:VCVARS64`" >nul && cmake --build build --parallel"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Check Windows runtime dependencies
        shell: pwsh
        run: |
          $dependents = cmd /c "`"$env:VCVARS64`" >nul && dumpbin /dependents build\release\iot-manager.exe"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $dependents | Write-Output

          $blocked = @(
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "libwinpthread-1.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll",
            "msvcp140.dll",
            "ucrtbase.dll"
          )

          $matches = @()
          foreach ($dll in $blocked) {
            if ($dependents -match [regex]::Escape($dll)) {
              $matches += $dll
            }
          }
          if ($matches.Count -gt 0) {
            throw "Unexpected dynamic runtime dependencies: $($matches -join ', ')"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: iot-manager-windows-Release
          path: build/release/
          retention-days: 3
