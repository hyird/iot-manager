name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    runs-on: ubuntu-latest
    name: linux - ${{ matrix.build_type }}

    env:
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 autoconf autoconf-archive automake libtool

      # 恢复 vcpkg 已安装包缓存（Configure 前）
      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-linux-x64-linux-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        run: |
          if [ ! -d "${{ github.workspace }}/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}/vcpkg"
          fi
          cd "${{ github.workspace }}/vcpkg"
          git fetch --depth 1 origin 66c0373dc7fca549e5803087b9487edfe3aca0a1
          git checkout --detach 66c0373dc7fca549e5803087b9487edfe3aca0a1
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}

      # 保存 vcpkg 缓存（Configure 后、Build 前，仅在缓存未命中时保存）
      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true' && matrix.build_type == 'Release'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-linux-x64-linux-${{ hashFiles('vcpkg.json') }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      # Strip Release 二进制（先 strip 再 UPX，效果更好）
      - name: Strip binary
        if: matrix.build_type == 'Release'
        run: strip --strip-all build/release/iot-manager

      # UPX 压缩 Release 二进制（最优压缩）
      - name: Compress with UPX
        if: matrix.build_type == 'Release'
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl
          upx --best --lzma build/release/iot-manager

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: iot-manager-linux-${{ matrix.build_type }}
          path: build/${{ matrix.build_type == 'Release' && 'release' || 'debug' }}/

  agent-armv7l:
    runs-on: ubuntu-latest
    name: edgenode - armv7l Release

    env:
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      MUSL_TOOLCHAIN_URL: https://github.com/userdocs/qbt-musl-cross-make/releases/latest/download/x86_64-arm-linux-musleabihf.tar.xz
      MUSL_TOOLCHAIN_DIR: ${{ github.workspace }}/arm-linux-musleabihf-cross
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Cache musl toolchain
        id: cache-musl
        uses: actions/cache@v5
        with:
          path: ${{ env.MUSL_TOOLCHAIN_DIR }}
          key: musl-arm-linux-musleabihf-v2

      - name: Download musl cross-compilation toolchain
        if: steps.cache-musl.outputs.cache-hit != 'true'
        run: |
          wget --retry-connrefused --waitretry=3 --tries=5 -O /tmp/musl-cross.tar.xz ${{ env.MUSL_TOOLCHAIN_URL }}
          mkdir -p ${{ env.MUSL_TOOLCHAIN_DIR }}
          tar xf /tmp/musl-cross.tar.xz -C ${{ env.MUSL_TOOLCHAIN_DIR }} --strip-components=1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf autoconf-archive automake libtool
          echo "${{ env.MUSL_TOOLCHAIN_DIR }}/bin" >> $GITHUB_PATH

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-arm-linux-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        run: |
          if [ ! -d "${{ github.workspace }}/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}/vcpkg"
          fi
          cd "${{ github.workspace }}/vcpkg"
          git fetch --depth 1 origin 66c0373dc7fca549e5803087b9487edfe3aca0a1
          git checkout --detach 66c0373dc7fca549e5803087b9487edfe3aca0a1
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}
          -DVCPKG_TARGET_TRIPLET=arm-linux
          -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/triplets
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=${{ github.workspace }}/cmake/toolchain-armv7l.cmake
          -DBUILD_FRONTEND=OFF

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-arm-linux-${{ hashFiles('vcpkg.json') }}

      - name: Build agent
        run: cmake --build build --config Release --target iot-edgenode --parallel

      - name: Strip binary
        run: arm-linux-musleabihf-strip --strip-all build/release/iot-edgenode

      - name: Compress with UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl
          upx --best --lzma build/release/iot-edgenode

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: iot-edgenode-armv7l-Release
          path: build/release/

  l2config-windows:
    runs-on: windows-latest
    name: l2config - Windows Release

    env:
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-windows-x64-static-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "${{ github.workspace }}\\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}\\vcpkg"
          }
          Set-Location "${{ github.workspace }}\\vcpkg"
          git fetch --depth 1 origin 66c0373dc7fca549e5803087b9487edfe3aca0a1
          git checkout --detach 66c0373dc7fca549e5803087b9487edfe3aca0a1
          .\\bootstrap-vcpkg.bat -disableMetrics

      - name: Download Npcap SDK
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.16.zip" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath third_party/npcap-sdk
        shell: pwsh

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}
          -DVCPKG_TARGET_TRIPLET=x64-windows-static
          -DBUILD_FRONTEND=OFF
          -DBUILD_L2CONFIG=ON

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-installed-windows-x64-static-${{ hashFiles('vcpkg.json') }}

      - name: Build l2config
        run: cmake --build build --config Release --target l2config --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: l2config-windows-Release
          path: build/release/l2config.exe

  cleanup:
    needs: [build, agent-armv7l, l2config-windows]
    if: always()
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_ids="$(gh run list --json databaseId --limit 1000 -q '.[1:] | .[].databaseId' || true)"
          if [ -z "$run_ids" ]; then
            echo "No extra runs to clean."
            exit 0
          fi
          for run_id in $run_ids; do
            gh run delete --repo "$GITHUB_REPOSITORY" "$run_id" --yes
          done
